name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER}/${REPO}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Generate deploy.yaml
        run: |
          cat > deploy.yaml << YAML
          ---
          version: "2.0"
          services:
            web:
              image: ${{ env.IMAGE }}:${{ github.sha }}
              expose:
                - port: 80
                  as: 80
                  accept:
                    - ${{ secrets.DOMAIN }}
                    - www.${{ secrets.DOMAIN }}
                  to:
                    - global: true
          profiles:
            compute:
              web:
                resources:
                  cpu:
                    units: 1
                  memory:
                    size: 128Mi
                  storage:
                    - size: 256Mi
            placement:
              akash:
                pricing:
                  web:
                    denom: uakt
                    amount: 100
                signedBy:
                  anyOf:
                    - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
                  allOf: []
          deployment:
            web:
              akash:
                profile: web
                count: 1
          YAML

      - name: Commit updated deploy.yaml
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add deploy.yaml
          git commit -m "update deploy.yaml"
          git push
