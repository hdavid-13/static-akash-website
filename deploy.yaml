---
version: "2.0"

services:
  web:
    image: ghcr.io/hugodavid-42/demo:e8d7a36737830224ad82e29a351726f7967cf9eb
    expose:
      - port: 80
        as: 80
        accept:
          - ${{ secrets.DOMAIN }}
          - www.${{ secrets.DOMAIN }}
        to:
          - global: true

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 1
        memory:
          size: 128Mi
        storage:
          - size: 256Mi
  placement:
    akash:
      pricing:
        web:
          denom: uakt
          amount: 100
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
        allOf: []

deployment:
  web:
    akash:
      profile: web
      count: 1
